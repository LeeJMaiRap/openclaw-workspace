<!doctype html><html><head><meta charset='utf-8'/><meta name='viewport' content='width=device-width,initial-scale=1'/><title>Agent Workflow Console</title><style>:root{--bg:#050816;--panel:#081229;--panel2:#0c1838;--line:#2b3f7c;--text:#dbe7ff;--muted:#8ea3d6;--cyan:#39d0ff;--vio:#9b7bff;--ok:#36f2a3;--warn:#ffcc66;--bad:#ff6b7a}*{box-sizing:border-box}body{margin:0;font-family:Inter,Segoe UI,Arial,sans-serif;color:var(--text);background:radial-gradient(900px 560px at 10% 0,#183074 0,transparent 60%),radial-gradient(900px 560px at 95% 0,#35136f 0,transparent 55%),linear-gradient(180deg,#050816,#081027);height:100vh;overflow:hidden}.top{height:62px;padding:10px 14px;border-bottom:1px solid #26386d;display:flex;align-items:center;justify-content:space-between;background:#050a1dcc;backdrop-filter:blur(8px)}.brand{font-weight:800;letter-spacing:.5px}.brand span{color:var(--cyan);text-shadow:0 0 16px #39d0ffaa}.controls{display:flex;gap:8px;align-items:center}.btn,button{border:1px solid #3556a5;background:linear-gradient(180deg,#13224f,#0b1638);color:#e8f7ff;border-radius:10px;padding:8px 11px;cursor:pointer}.btn:hover,button:hover{box-shadow:0 0 16px #39d0ff55;border-color:#4bdcff}.input,input,select{background:#07102a;color:var(--text);border:1px solid #2f4a8e;border-radius:10px;padding:8px 10px}.app{display:grid;grid-template-columns:270px 1fr 390px;height:calc(100vh - 62px)}.left,.inspect{background:#071027cc;border-right:1px solid #24386f;padding:12px;overflow:auto}.inspect{border-right:0;border-left:1px solid #24386f}.section-title{font-size:12px;color:var(--muted);letter-spacing:.12em;margin:10px 0}.agent{padding:10px;border:1px solid #2c4482;border-radius:14px;margin-bottom:10px;background:linear-gradient(180deg,#0d1838cc,#09132dcc);cursor:pointer}.agent.active{border-color:var(--cyan);box-shadow:0 0 18px #39d0ff38}.status-idle{color:#9bb0de}.status-working,.status-ack{color:var(--warn)}.status-done,.status-reviewed{color:var(--ok)}.status-blocked{color:var(--bad)}.canvas-wrap{position:relative;overflow:hidden;background:linear-gradient(transparent 31px,#1f2f6222 32px),linear-gradient(90deg,transparent 31px,#1f2f6222 32px),#06102a;background-size:32px 32px}.mode-chat .canvas-wrap{display:flex;align-items:center;justify-content:center}.chat-shell{width:min(820px,92%);height:min(680px,88%);border:1px solid #2c4482;border-radius:18px;background:#081432dd;box-shadow:0 0 28px #39d0ff22;display:flex;flex-direction:column}.chat-head{padding:12px;border-bottom:1px solid #24386f;font-weight:700}.msgs{flex:1;overflow:auto;padding:12px}.msg{border:1px solid #2c478a;border-radius:12px;padding:9px;margin-bottom:9px;background:#0b173bcc;white-space:pre-wrap}.meta{font-size:11px;color:#8ca4db;margin-bottom:4px}.composer{display:flex;gap:7px;flex-wrap:wrap;padding:10px;border-top:1px solid #233b72}.composer input[type=text]{flex:1;min-width:220px}.workflow{position:absolute;inset:0}.edges{position:absolute;inset:0;width:100%;height:100%;pointer-events:none}.edge{stroke:#375bad;stroke-width:2.5;fill:none;marker-end:url(#arrow);opacity:.78}.edge.flow{stroke:var(--cyan);stroke-dasharray:10 8;animation:dash 1s linear infinite;filter:drop-shadow(0 0 6px #39d0ff)}.edge.return{stroke:var(--vio);filter:drop-shadow(0 0 6px #9b7bff)}@keyframes dash{to{stroke-dashoffset:-36}}.node{position:absolute;width:260px;min-height:190px;border:1px solid #3556a5;border-radius:16px;background:linear-gradient(180deg,#0d1a40ee,#08132fee);box-shadow:0 0 24px #39d0ff22;overflow:hidden}.node.working{border-color:var(--warn);box-shadow:0 0 25px #ffcc6644}.node.done{border-color:var(--ok);box-shadow:0 0 25px #36f2a344}.node-head{display:flex;justify-content:space-between;align-items:center;padding:10px;border-bottom:1px solid #24386f}.node-title{font-weight:700}.spinner{width:16px;height:16px;border:2px solid #4b5d91;border-top-color:var(--warn);border-radius:50%;animation:spin 1s linear infinite;display:none}.node.working .spinner{display:block}@keyframes spin{to{transform:rotate(360deg)}}.dots::after{content:'';animation:dots 1.2s infinite}@keyframes dots{0%{content:''}33%{content:'.'}66%{content:'..'}100%{content:'...'}}.node-msgs{height:102px;overflow:auto;padding:8px;font-size:12px;white-space:pre-wrap}.node-foot{display:flex;gap:6px;padding:8px;border-top:1px solid #24386f}.mini{font-size:11px;padding:5px 7px}.tabs{display:flex;gap:6px;margin-bottom:10px}.tab{padding:7px 9px;border:1px solid #3556a5;border-radius:999px;cursor:pointer}.tab.active{border-color:var(--cyan);color:var(--cyan)}.panel{display:none}.panel.active{display:block}.art,.mail,.run{font-size:12px;margin:6px 0;padding:8px;border:1px solid #2c4482;border-radius:9px;background:#0b173b99}.muted{color:var(--muted);font-size:12px}.hidden{display:none}</style></head><body><div class='top'><div class='brand'>◉ <span>AGENT WORKFLOW</span> CONSOLE</div><div class='controls'><button onclick='switchMode("chat")'>Chat Mode</button><button onclick='switchMode("project")'>Project Mode</button><input id='newName' placeholder='New agent'/><select id='newLane'><option value='planning'>planning</option><option value='build'>build</option><option value='review'>review</option><option value='custom'>custom</option></select><button onclick='addAgent()'>+ Agent</button><button onclick='runFlow("normal")'>Run Project</button><button onclick='runFlow("fail-at-qa")'>Fail/Retry</button><button onclick='runAcceptance()'>Full Acceptance</button><button onclick='exportState()'>Export State</button><button onclick='resetDemoState()'>Reset Demo</button></div></div><div id='app' class='app mode-chat'><div class='left'><div class='section-title'>AGENTS</div><div id='agentList'></div><div class='section-title'>RUNS</div><div id='runs'></div></div><div class='canvas-wrap'><div id='chatShell' class='chat-shell'><div class='chat-head'>Assistant Chat</div><div class='msgs' id='chatMsgs'></div><div class='composer'><input id='chatText' type='text' placeholder='Nhắn bình thường hoặc nhập project brief...'/><input id='chatFile' type='file'/><button onclick='sendChat()'>Gửi</button><button onclick='uploadChat()'>Upload</button><button onclick='startRec()'>Voice In</button><button onclick='stopRec()'>Stop</button><button onclick='speakLast()'>Voice Out</button></div></div><div id='workflow' class='workflow hidden'><svg class='edges'><defs><marker id='arrow' markerWidth='10' markerHeight='10' refX='9' refY='3' orient='auto' markerUnits='strokeWidth'><path d='M0,0 L0,6 L9,3 z' fill='#39d0ff'/></marker></defs><path id='e-pm-req' class='edge' d='M0 0 C0 0 0 0 0 0'/><path id='e-req-be' class='edge' d='M0 0 C0 0 0 0 0 0'/><path id='e-be-qa' class='edge' d='M0 0 C0 0 0 0 0 0'/><path id='e-qa-pm' class='edge return' d='M0 0 C0 0 0 0 0 0'/></svg><div id='nodes'></div></div></div><div class='inspect'><div id='healthPanel' class='art'>Loading health...</div><div class='tabs'><div class='tab active' onclick='tab("chat")'>Chat</div><div class='tab' onclick='tab("mail")'>Mailbox</div><div class='tab' onclick='tab("art")'>Artifacts</div><div class='tab' onclick='tab("bridge")'>Bridge</div><div class='tab' onclick='tab("log")'>Log</div></div><div id='p-chat' class='panel active'><div id='inspectTitle'>Assistant</div><div class='msgs' id='inspectMsgs' style='height:360px'></div><div class='composer'><input id='nodeText' type='text' placeholder='Chat selected node...'/><input id='nodeFile' type='file'/><button onclick='sendNode()'>Gửi</button><button onclick='uploadNode()'>File</button></div></div><div id='p-mail' class='panel'><div id='mailbox'></div></div><div id='p-art' class='panel'><div class='muted' id='artifactHint'>Chọn run hoặc node để xem artifacts.</div><div id='artifacts'></div></div><div id='p-bridge' class='panel'><div id='bridgePanel'></div></div><div id='p-log' class='panel'><div id='logs'></div></div></div></div><script src='/socket.io/socket.io.js'></script><script>const s=io();let state={agents:[],messages:{},runs:[]},mode='chat',active='pm',selectedRun=null,rec,chunks=[],health=null;const layout={pm:[80,60],requirements:[390,60],backend:[390,310],qa:[700,310]};function qs(x){return document.getElementById(x)}function clsStatus(s){return 'status-'+s}function switchMode(m){mode=m;qs('app').className='app mode-'+m;qs('workflow').classList.toggle('hidden',m!=='project');qs('chatShell').classList.toggle('hidden',m==='project');setTimeout(drawEdges,50);renderAll()}function ensureMsg(id){if(!state.messages[id])state.messages[id]=[]}function renderAgents(){const el=qs('agentList');el.innerHTML='';state.agents.forEach(a=>{const d=document.createElement('div');d.className='agent'+(a.id===active?' active':'');d.onclick=()=>{active=a.id;renderAll()};d.innerHTML=`<b>${a.name}</b><div><span class='${clsStatus(a.status)}'>${a.status}</span> · ${a.lane}</div><div class='muted'>${a.id}</div>`;el.appendChild(d)})}function renderChat(){const arr=state.messages.pm||[];qs('chatMsgs').innerHTML=arr.map(msgHtml).join('');qs('chatMsgs').scrollTop=999999}function msgHtml(m){let extra='';if(m.url){if(/(png|jpg|jpeg|gif|webp)$/i.test(m.url))extra=`<div><img src='${m.url}' style='max-width:280px;border-radius:8px'/></div>`;else if(/(webm|mp3|wav|ogg|m4a)$/i.test(m.url))extra=`<audio controls src='${m.url}'></audio>`;else extra=`<a href='${m.url}' target='_blank'>${m.url}</a>`}return `<div class='msg'><div class='meta'>${m.ts} · ${m.role}</div>${m.text||''}${extra}</div>`}function escapeHtml(x){return String(x||'').replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]))}async function previewArtifact(runId,fileName){const r=await fetch(`/api/runs/${runId}/file/${encodeURIComponent(fileName)}`);const j=await r.json();if(!r.ok){qs('artifactPreview').innerHTML=`<div class='art'>Preview error: ${j.error}</div>`;return;}let html=`<div class='art'><b>${j.fileName}</b><br><span class='muted'>${j.kind} · ${j.size} bytes</span><br><a href='${j.url}' target='_blank'>Download raw</a></div>`;if(j.kind==='text')html+=`<pre class='art' style='white-space:pre-wrap;max-height:360px;overflow:auto'>${escapeHtml(j.content)}${j.truncated?'\n...TRUNCATED':''}</pre>`;else if(j.kind==='image')html+=`<div class='art'><img src='${j.url}' style='max-width:100%;border-radius:10px;border:1px solid #3556a5'/></div>`;else if(j.kind==='audio')html+=`<div class='art'><audio controls src='${j.url}' style='width:100%'></audio></div>`;else html+=`<div class='art'>No inline preview. Use download raw.</div>`;qs('artifactPreview').innerHTML=html}function renderNodes(){const box=qs('nodes');box.innerHTML='';state.agents.forEach(a=>{if(a.id!=='pm'&&mode==='chat')return;if(a.id!=='pm'&&a.status==='idle'&&!(state.messages[a.id]||[]).length)return;const p=layout[a.id]||[80+(Math.random()*600|0),80+(Math.random()*300|0)];const n=document.createElement('div');n.className='node '+(a.status==='working'||a.status==='ack'?'working':a.status==='done'||a.status==='reviewed'?'done':'');n.style.left=p[0]+'px';n.style.top=p[1]+'px';n.onclick=()=>{active=a.id;renderAll()};const last=(state.messages[a.id]||[]).slice(-3).map(x=>`${x.role}: ${x.text}`).join('\n');n.innerHTML=`<div class='node-head'><div><div class='node-title'>${a.name}</div><div class='muted ${clsStatus(a.status)}'>${a.status}<span class='${a.status==='working'?'dots':''}'></span></div></div><div class='spinner'></div></div><div class='node-msgs'>${last||'waiting...'}</div><div class='node-foot'><button class='mini' onclick='event.stopPropagation();active="${a.id}";renderAll()'>Open</button><button class='mini' onclick='event.stopPropagation();reviewNode("${a.id}")'>Review</button></div>`;box.appendChild(n)});drawEdges()}function center(id){const [x,y]=layout[id]||[0,0];return [x+130,y+95]}function edgePath(a,b){const A=center(a),B=center(b),mx=(A[0]+B[0])/2;return `M${A[0]} ${A[1]} C${mx} ${A[1]}, ${mx} ${B[1]}, ${B[0]} ${B[1]}`}function drawEdges(){[['e-pm-req','pm','requirements'],['e-req-be','requirements','backend'],['e-be-qa','backend','qa'],['e-qa-pm','qa','pm']].forEach(([eid,a,b])=>{const e=qs(eid);if(e)e.setAttribute('d',edgePath(a,b))})}function setFlow(edgeId,on){const e=qs(edgeId);if(e)e.classList.toggle('flow',on)}function mailHtml(m,box){return `<div class='mail'><b>${m.type.toUpperCase()}</b> · ${box}<br><span class='muted'>${m.ts} · ${m.from} -> ${m.to}</span><br><b>${m.subject||''}</b><br>${m.body||''}${m.artifactUrl?`<br><a href='${m.artifactUrl}' target='_blank'>artifact</a>`:''}</div>`}function renderInspect(){const a=state.agents.find(x=>x.id===active)||state.agents[0];if(!a)return;qs('inspectTitle').innerHTML=`<b>${a.name}</b><div class='muted'>${a.status} · ${a.lane}</div>`;qs('inspectMsgs').innerHTML=(state.messages[a.id]||[]).map(msgHtml).join('');qs('inspectMsgs').scrollTop=999999;const mb=(state.mailbox&&state.mailbox[a.id])||{inbox:[],outbox:[]};const unread=mb.inbox.filter(x=>!x.read).length;qs('mailbox').innerHTML=`<div class='mail'><b>${a.name}</b> mailbox · unread: ${unread}</div><div class='section-title'>INBOX</div>`+mb.inbox.slice().reverse().map(x=>mailHtml(x,'inbox')).join('')+`<div class='section-title'>OUTBOX</div>`+mb.outbox.slice().reverse().map(x=>mailHtml(x,'outbox')).join('');const binding=(state.bridge?.bindings||[]).find(b=>b.agentId===a.id);qs('bridgePanel').innerHTML=binding?`<div class='mail'><b>Bridge mode:</b> ${binding.mode}<br><b>Status:</b> ${binding.status}<br><b>Session:</b> ${binding.sessionKey||'not bound'}<br><b>Reason:</b> ${binding.reason}</div>`:`<div class='mail'>No bridge binding.</div>`;qs('logs').innerHTML=`<div class='mail'>Node log stream placeholder for ${a.id}</div>`}function renderRuns(){const el=qs('runs');el.innerHTML='';(state.runs||[]).slice(0,10).forEach(r=>{const d=document.createElement('div');d.className='run';d.innerHTML=`<b>${r.runId}</b><br>${r.status} · ${r.mode||'normal'} · ${r.phase||'-'}<br><a href='${r.path}/timeline.log' target='_blank'>timeline</a>`;d.onclick=()=>{selectedRun=r.runId;fetchArtifacts(r.runId)};el.appendChild(d)})}async function exportSelectedRun(){if(!selectedRun){alert('Select a run first');return;}const r=await fetch(`/api/runs/${selectedRun}/export`,{method:'POST'});const j=await r.json();if(!r.ok){alert('Export failed: '+j.error);return;}await fetchArtifacts(selectedRun);previewArtifact(selectedRun,'run-report.md')}async function fetchArtifacts(runId){const r=await fetch(`/api/runs/${runId}/files`);if(!r.ok)return;const j=await r.json();qs('artifactHint').textContent='Run: '+runId;qs('artifacts').innerHTML=j.files.map(f=>`<div class='art'><b>${f.name}</b> · <span class='muted'>${f.kind}</span><br><button class='mini' onclick='previewArtifact("${runId}","${f.name}")'>Preview</button> <a href='${f.url}' target='_blank'>Download</a></div>`).join('')+`<div id='artifactPreview'></div>`;tab('art')}function renderAll(){renderAgents();renderChat();renderNodes();renderInspect();renderRuns();renderHealth()}function tab(name){document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));document.querySelectorAll('.panel').forEach(x=>x.classList.remove('active'));event?.target?.classList.add('active');qs('p-'+name).classList.add('active')}async function postSend(agentId,text,url){await fetch('/api/send',{method:'POST',headers:{'content-type':'application/json'},body:JSON.stringify({agentId,role:'user',text,url})})}async function sendChat(){const t=qs('chatText').value;qs('chatText').value='';await postSend('pm',t)}async function sendNode(){const t=qs('nodeText').value;qs('nodeText').value='';await postSend(active,t)}async function up(inputId,agentId){const f=qs(inputId).files[0];if(!f)return;const fd=new FormData();fd.append('file',f);const r=await fetch('/api/upload',{method:'POST',body:fd});const j=await r.json();await postSend(agentId,`uploaded: ${j.name}`,j.url)}function uploadChat(){up('chatFile','pm')}function uploadNode(){up('nodeFile',active)}async function addAgent(){const name=qs('newName').value.trim();if(!name)return;const lane=qs('newLane').value;const r=await fetch('/api/agents',{method:'POST',headers:{'content-type':'application/json'},body:JSON.stringify({name,lane})});const a=await r.json();state.agents.push(a);state.messages[a.id]=[];active=a.id;qs('newName').value='';renderAll()}async function runFlow(m){switchMode('project');const task=prompt('Project brief?','Build mini todo cli add/list/done');if(task===null)return;setFlow('e-pm-req',true);setTimeout(()=>{setFlow('e-pm-req',false);setFlow('e-req-be',true)},2800);setTimeout(()=>{setFlow('e-req-be',false);setFlow('e-be-qa',true)},6400);setTimeout(()=>{setFlow('e-be-qa',false);setFlow('e-qa-pm',true)},9800);setTimeout(()=>setFlow('e-qa-pm',false),11600);await fetch('/api/runs/start',{method:'POST',headers:{'content-type':'application/json'},body:JSON.stringify({task,mode:m})})}async function reviewNode(id){const run=(state.runs||[])[0];if(!run){alert('No run to review');return;}const decision=confirm('OK = accept, Cancel = rework')?'accept':'rework';const reason=prompt('Review reason?', decision==='accept'?'accepted':'needs rework')||'';const r=await fetch('/api/review/decision',{method:'POST',headers:{'content-type':'application/json'},body:JSON.stringify({runId:run.runId,nodeId:id,decision,reason})});const j=await r.json();if(!r.ok){alert('Review failed: '+j.error);return;}const local=state.runs.find(x=>x.runId===run.runId);if(local){local.status=j.run.status;local.phase=j.run.phase;}renderAll()}async function startRec(){if(!navigator.mediaDevices)return alert('No mediaDevices');const stream=await navigator.mediaDevices.getUserMedia({audio:true});rec=new MediaRecorder(stream);chunks=[];rec.ondataavailable=e=>chunks.push(e.data);rec.onstop=async()=>{const blob=new Blob(chunks,{type:'audio/webm'});const f=new File([blob],'voice.webm');const fd=new FormData();fd.append('file',f);const r=await fetch('/api/upload',{method:'POST',body:fd});const j=await r.json();await postSend(active||'pm','voice message sent',j.url)};rec.start()}function stopRec(){if(rec)rec.stop()}function speakLast(){const arr=state.messages[active]||state.messages.pm||[];const t=arr.length?arr[arr.length-1].text:'no message';speechSynthesis.speak(new SpeechSynthesisUtterance(t))}function renderHealth(){if(!health){qs('healthPanel').innerHTML='Loading health...';return;}const bridge=health.bridge||{};const c=health.checklist||{};qs('healthPanel').innerHTML=`<b>Health</b><br>Server: ${health.ok?'OK':'BAD'} · uptime ${health.uptimeSec}s<br>Bridge: <span class='${bridge.realSessionEnabled?'status-done':'status-working'}'>${bridge.mode}</span>${bridge.realSessionEnabled?'':' ⚠ local fallback'}<br>Latest run: ${health.latestRun?health.latestRun.status+' / '+health.latestRun.phase:'none'}<br><div class='muted'>Checklist: mailbox ${c.mailboxTyped?'✓':'✗'} · review ${c.reviewGate?'✓':'✗'} · preview ${c.artifactInlinePreview?'✓':'✗'} · export ${c.exportReport?'✓':'✗'} · real sessions ${c.realOpenClawSessions?'✓':'✗'}</div>`}async function refreshHealth(){const r=await fetch('/api/health');health=await r.json();renderHealth()}async function runAcceptance(){switchMode('project');const r=await fetch('/api/acceptance/run',{method:'POST'});const j=await r.json();alert(j.message||'started');setTimeout(refreshHealth,1000)}async function exportState(){const r=await fetch('/api/state/export');const j=await r.json();const blob=new Blob([JSON.stringify(j,null,2)],{type:'application/json'});const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='agent-wall-state.json';a.click();URL.revokeObjectURL(a.href)}async function resetDemoState(){const ok=prompt('Type RESET_DEMO_STATE to reset UI state (backup kept server-side)');if(ok!=='RESET_DEMO_STATE')return;const r=await fetch('/api/state/reset-demo',{method:'POST',headers:{'content-type':'application/json'},body:JSON.stringify({confirm:ok})});const j=await r.json();if(!r.ok){alert(j.error);return;}alert('Reset done. Backup: '+j.backup);await load()}async function load(){const r=await fetch('/api/state');state=await r.json();await refreshHealth();renderAll()}s.on('msg',({agentId,msg})=>{ensureMsg(agentId);state.messages[agentId].push(msg);renderAll()});s.on('mail',m=>{state.mailbox=state.mailbox||{};state.mailbox[m.to]=state.mailbox[m.to]||{inbox:[],outbox:[]};state.mailbox[m.from]=state.mailbox[m.from]||{inbox:[],outbox:[]};state.mailbox[m.to].inbox.push(m);state.mailbox[m.from].outbox.push(m);renderAll()});s.on('mail_read',({agentId,mailId})=>{const mb=state.mailbox?.[agentId];const m=mb?.inbox.find(x=>x.id===mailId);if(m)m.read=true;renderAll()});s.on('agent_added',a=>{if(!state.agents.find(x=>x.id===a.id))state.agents.push(a);renderAll()});s.on('agent_status',({agentId,status})=>{const a=state.agents.find(x=>x.id===agentId);if(a)a.status=status;renderAll()});s.on('state_patch',({agents})=>{state.agents=agents;renderAll()});s.on('run_added',r=>{state.runs.unshift(r);renderRuns()});s.on('run_done',({runId})=>{const r=state.runs.find(x=>x.runId===runId);if(r)r.status='done';renderRuns();refreshHealth();if(selectedRun===runId)fetchArtifacts(runId)});s.on('run_report_exported',({runId})=>{if(selectedRun===runId)fetchArtifacts(runId)});s.on('review_decision',({run,review})=>{const r=state.runs.find(x=>x.runId===run.runId);if(r){r.status=run.status;r.phase=run.phase;}renderAll()});s.on('audit',()=>{});window.addEventListener('resize',drawEdges);load();</script></body></html>
