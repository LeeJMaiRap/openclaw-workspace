<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="520" viewBox="0 0 1200 520">
  <rect width="1200" height="520" fill="#fff7ed"/>
  <text x="600" y="55" text-anchor="middle" font-family="Arial" font-size="34" font-weight="700" fill="#7c2d12">Agent-Teams v1 Wave Flow</text>
  <g font-family="Arial" text-anchor="middle">
    <rect x="45" y="130" width="230" height="150" rx="20" fill="#dbeafe" stroke="#2563eb" stroke-width="3"/>
    <text x="160" y="170" font-size="24" font-weight="700" fill="#1e3a8a">Wave 1</text>
    <text x="160" y="205" font-size="18" fill="#1e40af">Planning</text>
    <text x="160" y="235" font-size="16" fill="#1e40af">requirements, contract,</text>
    <text x="160" y="260" font-size="16" fill="#1e40af">ownership map</text>
    <rect x="335" y="130" width="230" height="150" rx="20" fill="#dcfce7" stroke="#16a34a" stroke-width="3"/>
    <text x="450" y="170" font-size="24" font-weight="700" fill="#14532d">Wave 2</text>
    <text x="450" y="205" font-size="18" fill="#166534">Implementation</text>
    <text x="450" y="235" font-size="16" fill="#166534">owned paths only</text>
    <text x="450" y="260" font-size="16" fill="#166534">after approval</text>
    <rect x="625" y="130" width="230" height="150" rx="20" fill="#fef3c7" stroke="#d97706" stroke-width="3"/>
    <text x="740" y="170" font-size="24" font-weight="700" fill="#78350f">Wave 3</text>
    <text x="740" y="205" font-size="18" fill="#92400e">Integration / QA</text>
    <text x="740" y="235" font-size="16" fill="#92400e">tests, review,</text>
    <text x="740" y="260" font-size="16" fill="#92400e">handoff evidence</text>
    <rect x="915" y="130" width="230" height="150" rx="20" fill="#ede9fe" stroke="#7c3aed" stroke-width="3"/>
    <text x="1030" y="170" font-size="24" font-weight="700" fill="#4c1d95">Wave 4</text>
    <text x="1030" y="205" font-size="18" fill="#5b21b6">PM Acceptance</text>
    <text x="1030" y="235" font-size="16" fill="#5b21b6">traceability, cutover,</text>
    <text x="1030" y="260" font-size="16" fill="#5b21b6">retrospective</text>
  </g>
  <defs><marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L0,6 L9,3 z" fill="#334155"/></marker></defs>
  <g stroke="#334155" stroke-width="4" marker-end="url(#arrow)"><line x1="275" y1="205" x2="335" y2="205"/><line x1="565" y1="205" x2="625" y2="205"/><line x1="855" y1="205" x2="915" y2="205"/></g>
  <rect x="120" y="350" width="960" height="85" rx="18" fill="#ffffff" stroke="#fb923c" stroke-width="2"/>
  <text x="600" y="385" text-anchor="middle" font-family="Arial" font-size="20" font-weight="700" fill="#9a3412">Gate rules</text>
  <text x="600" y="420" text-anchor="middle" font-family="Arial" font-size="18" fill="#9a3412">Preflight trước Local/Integration/Production · no silent install · no deploy/cloud/secrets without approval · claims = evidence</text>
</svg>
